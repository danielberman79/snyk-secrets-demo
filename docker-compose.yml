version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: pgD3mo_daniel!7f3a9c2e
      POSTGRES_DB: app_prod
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
